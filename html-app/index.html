<style>
:root { --bg:#f5f6f8; --card:#fff; --border:#e2e5ea; --text:#1a2233; --muted:#66708a;
  --accent:#1f4fd8; --accent-soft:#e8eefc; --green:#1a8f4d; --green-soft:#e3f5ea;
  --red:#c9342c; --red-soft:#fdeceb; --amber:#b26a00; --amber-soft:#fff3e0;
  --purple:#6d3fc0; --purple-soft:#f0e9fb; --radius:10px; }
*{box-sizing:border-box} html,body{overflow-x:hidden}
body{margin:0;font-family:'Jost','Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px}
a{color:var(--accent);text-decoration:none;cursor:pointer}
h1{font-size:20px;margin:0 0 4px} h2{font-size:16px;margin:0 0 8px} h3{font-size:14px;margin:0 0 6px}
.app{display:flex;min-height:100vh}
.sidebar{width:220px;background:#101a33;color:#cfd6e6;padding:16px 0;flex-shrink:0;display:flex;flex-direction:column}
.sidebar .brand{padding:0 16px 16px;color:#fff;font-weight:700;font-size:15px;line-height:1.3;border-bottom:1px solid #24304f;margin-bottom:8px}
.sidebar nav a{display:block;padding:9px 16px;color:#cfd6e6;font-size:13.5px;border-left:3px solid transparent}
.sidebar nav a.active{background:#1c2947;color:#fff;border-left-color:var(--accent)}
.sidebar nav a:hover{background:#18233f}
.sidebar .foot{margin-top:auto;padding:12px 16px;font-size:12px;color:#8892ab;border-top:1px solid #24304f}
.main{flex:1;padding:16px 18px;max-width:1500px;min-width:0}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:12px;flex-wrap:wrap}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:14px}
.grid{display:grid;gap:12px}.grid.cols-2{grid-template-columns:repeat(auto-fit,minmax(320px,1fr))}.grid.cols-4{grid-template-columns:repeat(auto-fit,minmax(170px,1fr))}
@media(max-width:1000px){.grid.cols-4{grid-template-columns:repeat(2,1fr)}.grid.cols-2{grid-template-columns:1fr}}
.btn{display:inline-block;background:var(--accent);color:#fff;border:none;border-radius:7px;padding:8px 14px;font-size:13.5px;cursor:pointer;font-weight:600}
.btn:hover{filter:brightness(1.08)}
.btn.secondary{background:#fff;color:var(--text);border:1px solid var(--border)}
.btn.danger{background:var(--red)} .btn.small{padding:4px 10px;font-size:12.5px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.badge{display:inline-block;padding:2px 9px;border-radius:999px;font-size:11.5px;font-weight:600;white-space:nowrap}
.badge.blue{background:var(--accent-soft);color:var(--accent)} .badge.green{background:var(--green-soft);color:var(--green)}
.badge.red{background:var(--red-soft);color:var(--red)} .badge.amber{background:var(--amber-soft);color:var(--amber)}
.badge.purple{background:var(--purple-soft);color:var(--purple)} .badge.gray{background:#eef0f4;color:var(--muted)}
table.data{width:100%;border-collapse:collapse;font-size:13px}
table.data th{text-align:left;padding:8px 10px;border-bottom:2px solid var(--border);color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap}
table.data td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:top}
table.data tr:hover td{background:#fafbfd}
.field{margin-bottom:12px}
.field label{display:block;font-weight:600;font-size:12.5px;margin-bottom:4px}
.field .hint{font-weight:400;color:var(--muted);font-size:11.5px;margin-left:6px}
.field input[type=text],.field input[type=email],.field input[type=password],.field input[type=date],.field select,.field textarea{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:7px;font-size:13.5px;font-family:inherit;background:#fff}
.field textarea{min-height:80px;resize:vertical}
.checks{display:flex;flex-wrap:wrap;gap:8px}
.checks label{font-weight:400;font-size:13px;display:flex;align-items:center;gap:5px;background:#f2f4f8;padding:5px 10px;border-radius:7px;cursor:pointer}
.kanban{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px}
.kanban .col{min-width:240px;flex:1;background:#eef0f5;border-radius:var(--radius);padding:10px}
.kanban .col h3{font-size:12.5px;text-transform:uppercase;color:var(--muted);letter-spacing:.3px;display:flex;justify-content:space-between}
.kcard{background:#fff;border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:8px;cursor:pointer}
.kcard:hover{border-color:var(--accent)}
.kcard .title{font-weight:600;font-size:13px;margin:2px 0 6px}
.kcard .meta{display:flex;gap:5px;flex-wrap:wrap}
.kpi{text-align:center;padding:14px 8px}.kpi .num{font-size:26px;font-weight:700}.kpi .lbl{font-size:12px;color:var(--muted);margin-top:2px}
.roadmap-note{background:var(--purple-soft);border:1px dashed var(--purple);color:#4a2d85;border-radius:var(--radius);padding:10px 14px;font-size:12.5px;margin-bottom:14px}
.progress{background:#eef0f4;border-radius:999px;height:8px;overflow:hidden}
.progress>div{height:100%;border-radius:999px;transition:width .3s}
.modal-backdrop{position:fixed;inset:0;background:rgba(16,26,51,.45);display:flex;align-items:center;justify-content:center;z-index:50}
.modal{background:#fff;border-radius:12px;padding:20px;width:min(560px,92vw);max-height:88vh;overflow-y:auto}
.checklist li{list-style:none;padding:4px 0;font-size:13px}.checklist{padding-left:0;margin:8px 0}
.tabs{display:flex;gap:4px;margin-bottom:14px;border-bottom:1px solid var(--border)}
.tabs button{background:none;border:none;padding:8px 14px;font-size:13.5px;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;font-weight:600}
.tabs button.active{color:var(--accent);border-bottom-color:var(--accent)}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.filters select,.filters input{padding:6px 9px;border:1px solid var(--border);border-radius:7px;font-size:13px;background:#fff}
.activity-item{padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.activity-item .who{font-weight:600}.activity-item .when{color:var(--muted);font-size:11.5px}
.alert-line{display:flex;gap:8px;align-items:baseline;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#101a33}
.login-card{background:#fff;border-radius:14px;padding:32px;width:min(400px,92vw)}
.notif-dot{background:var(--red);color:#fff;border-radius:999px;font-size:10.5px;padding:1px 6px;margin-left:6px}
.muted{color:var(--muted)}.small{font-size:12px}.mb0{margin-bottom:0}
.bubble-wrap{position:relative}
.bubble-tip{position:absolute;background:#101a33;color:#fff;padding:6px 10px;border-radius:7px;font-size:12px;pointer-events:none;z-index:5}
.landing{min-height:100vh;background:#101a33;color:#dbe2f2}
.landing .wrap{max-width:980px;margin:0 auto;padding:48px 24px}
.landing .kicker{font-size:12.5px;letter-spacing:1.5px;text-transform:uppercase;color:#7f8db0;margin:0 0 10px}
.landing h1{font-size:34px;color:#fff;margin:0 0 12px;line-height:1.2}
.landing .sub{font-size:16px;color:#9fabc8;margin:0 0 26px;max-width:640px}
.landing .cta-row{display:flex;gap:16px;align-items:center;flex-wrap:wrap;margin-bottom:44px}
.landing .btn.big{padding:13px 24px;font-size:15px}
.landing h2{color:#fff;font-size:18px;margin:0 0 14px}
.landing .lcards{display:grid;grid-template-columns:repeat(auto-fit,minmax(175px,1fr));gap:12px;margin-bottom:38px}
.landing .lcard{background:#18233f;border:1px solid #24304f;border-radius:10px;padding:14px}
.landing .lcard .ic{font-size:22px}
.landing .lcard b{color:#fff;font-size:13.5px;display:block;margin:6px 0 4px}
.landing .lcard p{font-size:12.5px;color:#9fabc8;margin:0;line-height:1.45}
.stepper{display:flex;margin:14px 0 10px}
.step{flex:1;text-align:center;position:relative;font-size:11.5px;color:var(--muted);min-width:60px}
.step .bar{position:absolute;top:10px;left:-50%;width:100%;height:3px;background:#e2e5ea}
.step:first-child .bar{display:none}
.step.done .bar,.step.current .bar{background:var(--green)}
.step .dot{width:22px;height:22px;border-radius:50%;background:#fff;border:2px solid #cfd4de;color:var(--muted);margin:0 auto 4px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;position:relative}
.step.done .dot{background:var(--green);border-color:var(--green);color:#fff}
.step.current .dot{border-color:var(--accent);color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.step.current{color:var(--accent);font-weight:700}
@media print{.sidebar,.topbar,.no-print{display:none!important}.main{padding:0;max-width:none}body{background:#fff}.card{border:none;page-break-inside:avoid}}
</style>

<script>

var STAGES = ['L0 Submitted','L0 Triage','L1 Qualified','L2 BC/Charter','G1 Approval','Converted','Rejected','Hold'];

var VALUE_TYPES = ['Cost reduction','Cycle time reduction','Quality improvement','Risk reduction','Revenue enablement','Compliance','User experience','Data availability'];
var EFFORT = ['Low','Medium','High'], URGENCY = EFFORT, DATA_AVAILABILITY = ['Unknown','Low','Medium','High'];
var COMMITTEES = ['Pillar SteerCo','Digitalization SteerCo'];
var DECISION_COMMITTEES = COMMITTEES.concat(['Project Meeting']);
var DECISION_STATUSES = ['To Decide','Decided','Blocked','Deferred','Escalated'];
var OUTCOMES = ['Go','No-Go','Rework','Hold'];
var DOC_STATUSES = ['Draft','In Review','Ready for Gate','Approved','Rework'];
var PROJECT_STAGES = ['S1 (Scoping)','G2 (Business Case)','S2 (Planning)','G3 (Action Plan)','S3 (Execution)','G4 (Implementation)','S4 (Verification)','G5 (Closed)'];

function applyReference(rows, settings) {
  var m = { pillar: PILLARS, function: FUNCTIONS, value_type: VALUE_TYPES };
  Object.keys(m).forEach(function(cat) {
    var vals = (rows || []).filter(function(r){ return r.category === cat && r.active; }).map(function(r){ return r.value; });
    if (vals.length) { m[cat].length = 0; vals.forEach(function(v){ m[cat].push(v); }); }
  });
  (settings || []).forEach(function(s) {
    if (s.key === 'gate_ready_threshold') GATE_READY_PCT = Number(s.value) || 80;
    if (s.key === 'triage_sla_days') TRIAGE_SLA_DAYS = Number(s.value) || 7;
  });
}
var ROADMAP_NOTE = 'AI-guided intake and draft generation are planned for a future release. In the MVP, Business Case v0 and Project Charter v0 are generated from structured fields and enriched manually by the Program Manager / Digital Team.';
var BC_SECTIONS = [
  { key:'problem_statement', label:'2. Problem / Opportunity', hint:'What problem are we solving? Who is impacted? Why now?', required:true },
  { key:'proposed_solution', label:'3. Proposed Concept', hint:'Proposed digitalization / AI solution, operating model change', required:true },
  { key:'strategic_alignment', label:'4. Strategic Alignment', hint:'Digital pillar, link to business objectives', required:true },
  { key:'e3_impact_summary', label:'4b. E3 Impact', hint:'Environment, Economy, Engagement', required:false },
  { key:'expected_benefits', label:'5. Expected Benefits', hint:'Business benefits, target users / functions', required:true },
  { key:'assumptions', label:'7. Assumptions', hint:'Key assumptions and open questions', required:true },
  { key:'risks', label:'7b. Main Risks', hint:'Main risks', required:true },
  { key:'dependencies', label:'7c. Dependencies', hint:'Systems, data, organization', required:true },
  { key:'cost_estimate', label:'8. Rough Cost / Effort', hint:'CAPEX / OPEX, internal and external effort', required:true },
  { key:'resource_needs', label:'8b. Resource Needs', hint:'People / skills', required:false },
  { key:'success_metrics', label:'9. Success Metrics', hint:'Adoption, efficiency, quality KPIs, first value proof date', required:true }];
var CH_SECTIONS = [
  { key:'objectives', label:'2. Objectives', hint:'Main objective, expected outcomes', required:true },
  { key:'scope_in', label:'3. Scope In', hint:'In scope, target users / processes', required:true },
  { key:'scope_out', label:'3b. Scope Out', hint:'Explicitly out of scope', required:true },
  { key:'deliverables', label:'4. Deliverables', hint:'MVP / first deliverable, business, technical, change deliverables', required:true },
  { key:'high_level_timeline', label:'6. Timeline', hint:'Indicative start / end, key milestones', required:true },
  { key:'stakeholders', label:'7. Roles & Stakeholders', hint:'Sponsor, business owner, leads, key stakeholders', required:false },
  { key:'dependencies', label:'8. Dependencies', hint:'Data, systems, resources, other projects', required:true },
  { key:'governance_path', label:'5. Governance & Decision Path', hint:'Target gate, committee, required decision', required:true }];

/* ================= Pure business logic (spec §6 §14) ================= */
var SCORE = { Low:1, Medium:2, High:3 };
function complexityScore(i) {
  var vals = [i.resources_effort, i.cost_effort, i.change_effort, i.technical_effort].map(function(v){return SCORE[v]||0}).filter(Boolean);
  if (!vals.length) return null;
  return vals.reduce(function(a,b){return a+b},0)/vals.length;
}
function impactScore(i) {
  var s = 0;
  if (i.urgency) s += SCORE[i.urgency];
  s += Math.min((i.expected_value_types||[]).length,3)*0.5;
  s += [i.e3_environment,i.e3_economy,i.e3_engagement].filter(Boolean).length*0.5;
  if (i.estimated_value) s += 1;
  return s;
}
function suggestQuickWin(i) {
  var cx = complexityScore(i);
  return Boolean(i.estimated_value && cx !== null && cx <= 2 && (i.cost_effort === 'Low' || !i.cost_effort));
}
function suggestPriority(i) {
  return Boolean(i.urgency === 'High' && ((i.impacted_functions||[]).length >= 2 || i.digital_pillar));
}
function daysInTriage(i) {
  if (['L0 Submitted','L0 Triage'].indexOf(i.stage) < 0) return 0;
  return Math.floor((Date.now() - new Date(i.submitted_date)) / 86400000);
}
function triageOverdue(i) { return daysInTriage(i) > TRIAGE_SLA_DAYS; }
function l1Criteria(i) {
  return [
    { label:'Not an obvious duplicate, or duplicate relationship documented', ok:true },
    { label:'Fits a digital pillar or marked "To Be Confirmed"', ok:!!i.digital_pillar },
    { label:'Clear problem / opportunity statement', ok:(i.opportunity||'').length >= 30 },
    { label:'Plausible business benefit', ok:(i.business_benefits||'').length >= 20 },
    { label:'Identified owner for next-step assessment', ok:!!i.owner_id },
    { label:'Within digitalization scope (triage note if unclear)', ok:true }];
}
function l2Criteria(i) {
  return [
    { label:'Sponsor or provisional sponsor identified', ok:!!i.provisional_sponsor },
    { label:'Impacted function(s) identified', ok:(i.impacted_functions||[]).length > 0 },
    { label:'Expected value type selected', ok:(i.expected_value_types||[]).length > 0 },
    { label:'Complexity / effort assessment completed', ok:complexityScore(i) !== null },
    { label:'Initial risks and system dependencies documented', ok:!!i.risks_challenges || !!i.interface_systems }];
}
function completeness(doc, sections) {
  var req = sections.filter(function(s){return s.required});
  var done = req.filter(function(s){return ((doc[s.key]||'').trim().length >= 10)});
  return { done:done.length, total:req.length, pct:Math.round(done.length/req.length*100),
    missing:req.filter(function(s){return (doc[s.key]||'').trim().length < 10}).map(function(s){return s.label}) };
}
function bcCompleteness(d){ return completeness(d, BC_SECTIONS); }
function chCompleteness(d){ return completeness(d, CH_SECTIONS); }
function g1Criteria(i, bc, ch) {
  var bcc = (bc && bc.content) || {}, chc = (ch && ch.content) || {};
  return [
    { label:'Business Case complete enough for decision', ok:bc ? bcCompletenessLean(bc).pct >= GATE_READY_PCT : false },
    { label:'Project Charter complete enough for decision', ok:ch ? chCompletenessLean(ch).pct >= GATE_READY_PCT : false },
    { label:'Explicit recommendation (Go / No-Go / Rework / Hold)', ok:!!(bc && bc.recommendation) },
    { label:'Rough budget / effort estimate documented', ok:!!bcc.estimated_cost },
    { label:'Benefits and success measures documented', ok:!!(bcc.expected_benefits && (bcc.kpis||[]).length) },
    { label:'Scope in / scope out documented', ok:!!(chc.in_scope && chc.out_scope) },
    { label:'Risks, dependencies, assumptions documented', ok:!!((bcc.risks||[]).length && bcc.critical_assumption) },
    { label:'Project Manager (lead) proposed', ok:!!(ch && ch.project_lead) },
    { label:'Committee target selected', ok:!!(i.committee_target || (bc && bc.committee_target)) }];
}
function conversionCriteria(i, decisions) {
  var g1 = (decisions||[]).find(function(d){ return d.related_id === i.idea_id && d.status === 'Decided' && d.outcome === 'Go'; });
  return [
    { label:'A Go decision is logged for this initiative in the Decision Log', ok:!!g1 },
    { label:'Committee decision logged', ok:!!g1 }];
}
function projectAlerts(p, hasInAppCharter) {
  var a = [], today = new Date();
  var closed = (p.current_stage||'').indexOf('G5') === 0 || (p.current_stage||'').indexOf('S4') === 0;
  if (p.planned_end_date && new Date(p.planned_end_date) < today && !closed) a.push({type:'planning',msg:'Planned end date passed'});
  if (p.planned_start_date && new Date(p.planned_start_date) < today && (p.current_stage||'').indexOf('S1') === 0) a.push({type:'planning',msg:'Started per plan but still in Scoping'});
  if (p.capex_keur == null && p.current_year_budget == null) a.push({type:'budget',msg:'No CAPEX / budget data'});
  if (!hasInAppCharter && (!p.charter_status || p.charter_status === 'Not created')) a.push({type:'governance',msg:'Charter missing'});
  if (p.it_demand_status === 'Not created') a.push({type:'governance',msg:'IT demand not created'});
  if (p.ar_status === 'Not created') a.push({type:'governance',msg:'AR not created'});
  var na = (p.needs_attention||'').toLowerCase();
  if (na.indexOf('budget') >= 0) a.push({type:'budget',msg:'Flagged: budget attention'});
  if (na.indexOf('planning') >= 0) a.push({type:'planning',msg:'Flagged: planning attention'});
  return a;
}
function charterMap(charters) {
  var m = {};
  (charters || []).forEach(function(ch){ if (ch.smartsheet_project_id) m[ch.smartsheet_project_id] = ch; });
  return m;
}
function isPriorityProject(p){ return (p.needs_attention||'').toLowerCase().indexOf('priority') >= 0; }
function isQuickWinProject(p){ return (p.needs_attention||'').toLowerCase().indexOf('quick win') >= 0; }

/* ================= Data access layer (Supabase) ================= */
function one(r) { if (r.error) throw r.error; return r.data; }
var api = {
  getSession: function(){ return sb.auth.getSession().then(function(r){ return r.data.session; }); },

  getMyProfile: function(){ return api.getSession().then(function(s){

/* ================= SmartSheet import/export ================= */
var SMARTSHEET_COLUMNS = ['Id','Needs attention','Project Category','Project Name','Current Stage','Digital Pillar','Key Benefiting Functions','Project Execution phase','Pillar Sponsor','Project Description','Project Lead','PWR-T IT lead','Integrator/Consultants','Charter Status','Charter file','IT Demand Status','AR Status','AR file','CAPEX k€','Current Y Budget','Cost Center/Internal Order','Planned Start Date','Planned End Date','Linked Initiatives #'];
var FIELD_MAP = {'Id':'project_id','Needs attention':'needs_attention','Project Category':'project_category','Project Name':'project_name','Current Stage':'current_stage','Digital Pillar':'digital_pillar','Key Benefiting Functions':'key_benefiting_functions','Project Execution phase':'execution_phase','Pillar Sponsor':'pillar_sponsor','Project Description':'project_description','Project Lead':'project_lead','PWR-T IT lead':'pwt_it_lead','Integrator/Consultants':'integrator_consultants','Charter Status':'charter_status','Charter file':'charter_file','IT Demand Status':'it_demand_status','AR Status':'ar_status','AR file':'ar_file','CAPEX k€':'capex_keur','Current Y Budget':'current_year_budget','Cost Center/Internal Order':'cost_center_internal_order','Planned Start Date':'planned_start_date','Planned End Date':'planned_end_date','Linked Initiatives #':'linked_initiative_id'};
function ssToDate(v) {
  if (v == null || v === '') return null;
  if (v instanceof Date) return v.toISOString().slice(0,10);
  if (typeof v === 'number') { var d = XLSX.SSF.parse_date_code(v); if (!d) return null;
    return d.y + '-' + String(d.m).padStart(2,'0') + '-' + String(d.d).padStart(2,'0'); }
  var d2 = new Date(v); return isNaN(d2) ? null : d2.toISOString().slice(0,10);
}
function ssToNum(v) { if (v == null || v === '') return null; var n = Number(String(v).replace(',','.')); return isNaN(n) ? null : n; }
function parseSmartsheetFile(file) {
  return file.arrayBuffer().then(function(buf){
    var wb = XLSX.read(buf, {cellDates:true});
    var sheet = null;
    for (var k = 0; k < wb.SheetNames.length; k++) {
      var head = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[k]], {header:1, range:0})[0] || [];
      if (head.indexOf('Id') >= 0 && head.indexOf('Project Name') >= 0) { sheet = wb.Sheets[wb.SheetNames[k]]; break; }
    }
    if (!sheet) throw new Error('No sheet with SmartSheet columns (Id, Project Name) found');
    var raw = XLSX.utils.sheet_to_json(sheet, {defval:null});
    var warnings = [];
    var headers = Object.keys(raw[0] || {});
    headers.forEach(function(hd){ if (SMARTSHEET_COLUMNS.indexOf(hd) < 0) warnings.push('Unknown column ignored: "' + hd + '"'); });
    SMARTSHEET_COLUMNS.forEach(function(c){ if (headers.indexOf(c) < 0) warnings.push('Missing column: "' + c + '"'); });
    var rows = raw.filter(function(r){ return r['Id']; }).map(function(r){
      var out = {};
      Object.keys(FIELD_MAP).forEach(function(col){
        var field = FIELD_MAP[col], v = r[col];
        if (field === 'planned_start_date' || field === 'planned_end_date') v = ssToDate(v);
        else if (field === 'capex_keur' || field === 'current_year_budget') v = ssToNum(v);
        else if (typeof v === 'string') v = v.trim() || null;
        out[field] = (v === undefined) ? null : v;
      });
      return out;
    });
    var seen = new Set();
    rows.forEach(function(r){ if (seen.has(r.project_id)) warnings.push('Duplicate project Id in file: ' + r.project_id); seen.add(r.project_id); });
    return { rows: rows, warnings: warnings };
  });
}
function exportInitiativesToSmartsheet(items, filename) {
  var data = items.map(function(it){
    var idea = it.idea, charter = it.charter, bc = it.bc, row = {};
    row['Id'] = idea.linked_project_id || '';
    row['Needs attention'] = [idea.priority && 'Priority', idea.quick_win && 'Quick Win'].filter(Boolean).join(', ');
    row['Project Category'] = 'Digitalization';
    row['Project Name'] = idea.title;
    row['Current Stage'] = 'S1 (Scoping)';
    row['Digital Pillar'] = idea.digital_pillar || '';
    row['Key Benefiting Functions'] = (idea.impacted_functions||[]).join(', ');
    row['Project Execution phase'] = 'Discovery';
    row['Pillar Sponsor'] = (charter && charter.sponsor) || idea.provisional_sponsor || '';
    row['Project Description'] = idea.opportunity || '';
    row['Project Lead'] = (charter && charter.project_lead) || '';
    row['PWR-T IT lead'] = ''; row['Integrator/Consultants'] = '';
    row['Charter Status'] = charter ? (charter.status === 'Approved' ? 'Approved' : 'Created & not approved') : 'Not created';
    row['Charter file'] = ''; row['IT Demand Status'] = 'Not created'; row['AR Status'] = 'Not created'; row['AR file'] = '';
    row['CAPEX k€'] = (bc && ((bc.content && bc.content.estimated_cost) || bc.cost_estimate)) || ''; row['Current Y Budget'] = ''; row['Cost Center/Internal Order'] = '';
    row['Planned Start Date'] = ''; row['Planned End Date'] = '';
    row['Linked Initiatives #'] = idea.idea_id;
    return row;
  });
  var ws = XLSX.utils.json_to_sheet(data, {header:SMARTSHEET_COLUMNS});
  var wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Projects');
  XLSX.writeFile(wb, filename);
}
function validateForExport(idea, charter) {
  var e = [];
  if (!idea.linked_project_id) e.push('Missing project ID');
  if (!idea.title) e.push('Missing project name');
  if (!idea.digital_pillar) e.push('Missing digital pillar');
  if (!charter || !charter.project_lead) e.push('Missing project lead in charter');
  return e;
}

function useAsync(fn, deps) {
  var st = useState({loading:true, data:null, error:null});
  var state = st[0], setState = st[1];
  function reload() {
    setState(function(s){ return {loading:true, data:s.data, error:null}; });
    fn().then(function(data){ setState({loading:false, data:data, error:null}); })
      .catch(function(error){ setState({loading:false, data:null, error:error}); });
  }
  useEffect(reload, deps || []);
  return { loading:state.loading, data:state.data, error:state.error, reload:reload };
}
/* hash router */
function cleanHash() {
  var hh = location.hash.slice(1) || '/';
  // Supabase magic-link / recovery callbacks put tokens in the hash — not a route.
  if (hh.indexOf('access_token=') >= 0 || hh.indexOf('error_description=') >= 0 || hh.indexOf('error_code=') >= 0) return '/';
  return hh;
}
function useRoute() {
  var st = useState(cleanHash());
  useEffect(function(){
    function onHash(){ st[1](cleanHash()); }
    window.addEventListener('hashchange', onHash);
    return function(){ window.removeEventListener('hashchange', onHash); };
  }, []);
  return st[0];
}

function BubbleChart(p) {
  var W = 800, H = 420, pad = 45;
  var pts = p.ideas.map(function(i){ return { i:i, x:(complexityScore(i)!==null?complexityScore(i):1.5), y:impactScore(i) }; });
  var maxY = Math.max.apply(null, [5].concat(pts.map(function(q){return q.y})));
  function sx(v){ return pad + ((v-1)/2) * (W-2*pad); }
  function sy(v){ return H - pad - (v/maxY) * (H-2*pad); }
  return html`<div>
    ${p.tip && html`<div class="bubble-tip" style="left:${p.tip.px+12}px;top:${p.tip.py-10}px">${p.tip.label}</div>`}
    <svg viewBox="0 0 ${W} ${H}" style="width:100%;max-height:460px" onMouseLeave=${function(){p.setTip(null)}}>
      <line x1=${pad} y1=${H-pad} x2=${W-pad} y2=${H-pad} stroke="#c8cdd8" />
      <line x1=${pad} y1=${pad} x2=${pad} y2=${H-pad} stroke="#c8cdd8" />
      <text x=${W/2} y=${H-10} text-anchor="middle" font-size="12" fill="#66708a">Complexity →</text>
      <text x="14" y=${H/2} text-anchor="middle" font-size="12" fill="#66708a" transform="rotate(-90 14 ${H/2})">Impact →</text>
      ${['Low','Medium','High'].map(function(l,k){ return html`<text key=${l} x=${sx(k+1)} y=${H-pad+16} text-anchor="middle" font-size="11" fill="#8892ab">${l}</text>`; })}
      <rect x=${pad} y=${pad} width=${(W-2*pad)/2} height=${(H-2*pad)/2} fill="#1a8f4d" opacity="0.05" />
      <text x=${pad+8} y=${pad+16} font-size="11" fill="#1a8f4d">Quick-win zone</text>
      ${pts.map(function(q,k){
        var i = q.i;
        return html`<circle key=${k} cx=${sx(q.x)} cy=${sy(q.y)} r=${i.priority?14:10}
          fill=${i.quick_win?'var(--green)':i.priority?'var(--red)':'var(--accent)'} opacity="0.75" style="cursor:pointer"
          onClick=${function(){nav('/ideas/'+i.id)}}
          onMouseEnter=${function(e){p.setTip({px:e.offsetX, py:e.offsetY, label:i.idea_id+' — '+i.title})}} />`; })}
    </svg></div>`;
}

/* ================= Idea journey stepper + My Ideas ================= */
var JOURNEY_STEPS = [
  { stage:'L0 Submitted', label:'Submitted' },
  { stage:'L0 Triage', label:'Triage' },
  { stage:'L1 Qualified', label:'Qualified' },
  { stage:'L2 BC/Charter', label:'Your kit' },
  { stage:'G1 Approval', label:'Committee' },
  { stage:'Converted', label:'Project' }];
function journeyIndex(stage) {
  for (var k = 0; k < JOURNEY_STEPS.length; k++) if (JOURNEY_STEPS[k].stage === stage) return k;
  return -1;
}
function IdeaStepper(p) {
  var i = p.idea;
  if (i.stage === 'Rejected' || i.stage === 'Hold') {
    var rej = i.stage === 'Rejected';
    return html`<div style="background:${rej ? 'var(--red-soft)' : '#eef0f4'};border-left:4px solid ${rej ? 'var(--red)' : 'var(--muted)'};border-radius:8px;padding:10px 14px;margin:10px 0;font-size:13px">
      <b>${rej ? '❌ Not selected' : '⏸ On hold'}</b>
      ${i.status_reason ? html`<span> — ${i.status_reason}</span>` : ''}
      ${!rej && html`<span class="muted small"> · The idea can be reopened later.</span>`}
    </div>`;
  }
  var idx = journeyIndex(i.stage);
  return html`<div class="stepper">
    ${JOURNEY_STEPS.map(function(s, k) {
      var cls = k < idx || (k === idx && s.stage === 'Converted') ? 'done' : k === idx ? 'current' : '';
      return html`<div key=${s.label} class="step ${cls}">
        <div class="bar"></div>
        <div class="dot">${k < idx || (k === idx && s.stage === 'Converted') ? '✓' : k + 1}</div>
        ${s.label}
      </div>`; })}
  </div>`;
}
function MyIdeasPage(p) {

function GateBox(p) {
  var i = p.i, criteria = g1Criteria(i, p.bc, p.ch);
  var missing = criteria.filter(function(x){return !x.ok});
  var cm = useState(i.committee_target || 'Pillar SteerCo');
  var note = useState('');
  var bz = useState(false), er = useState(null);
  function decide(outcome) {
    bz[1](true); er[1](null);
    api.createDecision({
      title: 'G1 gate decision: ' + i.idea_id + ' - ' + i.title,
      related_type: 'Idea', related_id: i.idea_id,
      committee_target: cm[0], status: 'Decided', outcome: outcome,
      decision_date: new Date().toISOString().slice(0,10),
      decision_notes: note[0] || null, owner_id: p.auth.profile.id
    }).then(function() {
      var next = outcome === 'No-Go' ? 'Rejected' : outcome === 'Hold' ? 'Hold'
        : outcome === 'Rework' ? 'L2 BC/Charter' : null;
      return next ? api.updateIdea(i.id, { stage: next }) : null;
    }).then(function(){ p.onDone(); })
      .catch(function(e){ er[1](e.message); }).finally(function(){ bz[1](false); });
  }
  return html`<div class="card" style="border-left:4px solid var(--purple)">
    <h2>⚖️ G1 Gate decision — ${cm[0]}</h2>
    ${missing.length
      ? html`<p class="small" style="color:var(--amber)">Readiness gaps (${missing.length}): ${missing.map(function(x){return x.label}).join(' · ')}</p>`
      : html`<p class="small" style="color:var(--green)">✅ All readiness criteria met.</p>`}

      <button class="btn danger" disabled=${bz[0]} onClick=${function(){decide('No-Go')}}>No-Go</button>
      <button class="btn secondary" disabled=${bz[0]} onClick=${function(){decide('Rework')}}>Rework → L2</button>

function leanVal(doc, f, key) {
  if (key.indexOf('col:') === 0) return doc[key.slice(4)] || '';
  return (doc.content && doc.content[key]) || '';
}
function leanCompleteness(cfg) {
  return function(doc) {
    var missing = [], done = 0, total = 0;
    cfg.sections.forEach(function(sec) {
      (sec.fields||[]).forEach(function(fl) {
        if (!fl.required) return;
        total++;
        var v = leanVal(doc, fl, fl.key);
        if (String(v).trim().length >= 3) done++; else missing.push(fl.label);
      });
      (sec.tables||[]).forEach(function(tb) {
        if (!tb.required) return;
        total++;
        var rows = (doc.content && doc.content[tb.key]) || [];
        var filled = rows.some(function(r){ return Object.keys(r).some(function(k){ return String(r[k]||'').trim().length >= 2; }); });
        if (filled) done++; else missing.push(tb.label + ' (at least one row)');
      });
    });
    return { done:done, total:total, pct: total ? Math.round(done/total*100) : 0, missing:missing };
  };
}
var bcCompletenessLean = leanCompleteness(BC_LEAN);
var chCompletenessLean = leanCompleteness(CH_LEAN);

function TableEditor(p) {

  }
  function addRow() {
    var n = {}; p.cols.forEach(function(c){ n[c.k] = ''; });
    p.onChange(rows.concat([n]));
  }
  function delRow(ri) { p.onChange(rows.filter(function(_, i){ return i !== ri; })); }
  return html`<div style="margin-bottom:12px">
    <label style="display:block;font-weight:600;font-size:12.5px;margin-bottom:4px">${p.label}${p.required ? ' *' : ''}</label>
    <div style="overflow-x:auto"><table class="data">
      <thead><tr>${p.cols.map(function(c){return html`<th key=${c.k}>${c.l}</th>`})}${p.canEdit && html`<th></th>`}</tr></thead>
      <tbody>
        ${rows.map(function(r, ri) {
          return html`<tr key=${ri}>
            ${p.cols.map(function(c) {
              return html`<td key=${c.k} style="min-width:110px">

function LeanDocEditor(p) {

      <div style="display:flex;gap:8px" class="no-print">

        ${isPMTT && html`<button class="btn secondary" onClick=${function(){save(true)}} disabled=${bz[0]}>Save as new version</button>`}
        ${canEdit && html`<button class="btn" onClick=${function(){save(false)}} disabled=${bz[0]}>Save</button>`}

    </div>

    ${isOwnerKit && html`<div class="roadmap-note" style="background:var(--green-soft);border-color:var(--green);color:#14532d">

    <div class="card no-print">

        <div style="flex:1;min-width:220px">

            ${' '}<${Badge} color=${readiness ? 'green' : 'amber'}>${readiness ? 'Gate ready' : 'Not gate ready'}<//></div>
          <${Progress} pct=${comp.pct} />
        </div>
        <${Field} label="Status">

    ${cfg.sections.map(function(sec) {
      return html`<div class="card" key=${sec.title}>

        ${(sec.tables||[]).map(function(tb) {

function DecisionLog(p) {
  var decisions = useAsync(api.listDecisions, []);
  var profiles = useAsync(api.listProfiles, []);
  var tb = useState('Open'), tab = tb[0];
  var ed = useState(null), editing = ed[0], setEditing = ed[1];
  var TABS = ['Open','Next SteerCo','By committee','Deferred / Escalated','History'];
  var list = decisions.data || [];
  function overdue(d){ return d.due_date && d.status==='To Decide' && new Date(d.due_date) < new Date(); }
  function dueSoon(d){ return d.due_date && d.status==='To Decide' && (new Date(d.due_date)-Date.now())/86400000 <= 7 && !overdue(d); }
  var view = tab==='Open' ? list.filter(function(d){return d.status==='To Decide'||d.status==='Blocked'})
    : tab==='Next SteerCo' ? list.filter(function(d){return d.next_steerco && d.status!=='Decided'})
    : tab==='Deferred / Escalated' ? list.filter(function(d){return ['Deferred','Escalated'].indexOf(d.status)>=0})
    : tab==='History' ? list.filter(function(d){return d.status==='Decided'}) : list;
  function DTable(props) {
    return html`<table class="data">
      <thead><tr><th>ID</th><th>Decision</th><th>Related</th><th>Committee</th><th>Owner</th><th>Due</th><th>Reco</th><th>Status</th><th>Outcome</th><th></th></tr></thead>
      <tbody>${props.rows.map(function(d){
        return html`<tr key=${d.id}>
          <td class="muted small">${d.decision_id}</td>
          <td>${d.title}${d.next_steerco && html` <${Badge} color="purple">Next SteerCo<//>`}</td>
          <td class="small">${d.related_type} · ${d.related_id}</td>
          <td class="small">${d.committee_target}</td>
          <td class="small">${(d.owner&&d.owner.name)||'—'}</td>
          <td>${fmtDate(d.due_date)} ${overdue(d)&&html`<${Badge} color="red">overdue<//>`}${dueSoon(d)&&html`<${Badge} color="amber">≤7d<//>`}</td>
          <td>${d.recommendation||'—'}</td>
          <td><${Badge} color=${d.status==='Decided'?'green':d.status==='Escalated'?'red':d.status==='To Decide'?'amber':'gray'}>${d.status}<//></td>
          <td>${d.outcome||'—'}</td>
          <td>${p.auth.isPMTT && html`<button class="btn secondary small" onClick=${function(){setEditing(d)}}>Edit</button>`}</td></tr>`; })}
      ${!props.rows.length && html`<tr><td colSpan="10" class="muted">Nothing here.</td></tr>`}
      </tbody></table>`;
  }
  return html`<div>
    <div class="topbar"><h1>Decision Log</h1>
      ${p.auth.isPMTT && html`<button class="btn" onClick=${function(){setEditing('new')}}>+ New decision</button>`}</div>
    <div class="tabs">${TABS.map(function(t){return html`<button key=${t} class=${tab===t?'active':''} onClick=${function(){tb[1](t)}}>${t}</button>`})}</div>
    ${tab==='By committee'
      ? DECISION_COMMITTEES.map(function(c){
          return html`<div class="card" key=${c}><h2>${c}</h2>
            <${DTable} rows=${list.filter(function(d){return d.committee_target===c && d.status!=='Decided'})} /></div>`; })
      : html`<div class="card" style="overflow-x:auto"><${DTable} rows=${view} /></div>`}
    ${editing && html`<${DecisionModal} decision=${editing==='new'?null:editing} profiles=${profiles.data||[]}
      me=${p.auth.profile} onClose=${function(){setEditing(null)}}
      onSaved=${function(){setEditing(null); decisions.reload();}} />`}
  </div>`;
}

/* ================= Pipeline swimlane chart (collapsible ideation) ================= */
function pipeSlots(expanded) {
  var idea = expanded
    ? [ { key:'L0 Submitted', short:'L0', type:'stage' }, { key:'L0 Triage', short:'Triage', type:'stage' },
        { key:'L1 Qualified', short:'L1', type:'stage' }, { key:'L2 BC/Charter', short:'L2', type:'stage' } ]
    : [ { key:'ideation', short:'Ideation L0→L2', type:'stage' } ];
  return idea.concat([
    { key:'G1', short:'G1', type:'gate', sub:'Approve for scoping' },
    { key:'S1', short:'S1', type:'stage' }, { key:'G2', short:'G2', type:'gate', sub:'Business case decision' },
    { key:'S2', short:'S2', type:'stage' }, { key:'G3', short:'G3', type:'gate', sub:'Action plan decision' },
    { key:'S3', short:'S3', type:'stage' }, { key:'G4', short:'G4', type:'gate', sub:'Implementation complete' },
    { key:'S4', short:'S4', type:'stage' }, { key:'G5', short:'G5', type:'gate', sub:'Sustainable / closed' } ]);
}
function pipeSlotIdea(i, expanded) {
  if (expanded) {
    var m = { 'L0 Submitted':0, 'L0 Triage':1, 'L1 Qualified':2, 'L2 BC/Charter':3, 'G1 Approval':4 };
    return m[i.stage] != null ? m[i.stage] : null;
  }
  var m2 = { 'L0 Submitted':0, 'L0 Triage':0, 'L1 Qualified':0, 'L2 BC/Charter':0, 'G1 Approval':1 };
  return m2[i.stage] != null ? m2[i.stage] : null;
}
function pipeSlotProject(p, expanded) {
  var base = expanded ? 5 : 2;
  var s = (p.current_stage || '');
  var m = { 'S1':0, 'G2':1, 'S2':2, 'G3':3, 'S3':4, 'G4':5, 'S4':6, 'G5':7 };
  for (var k in m) { if (s.indexOf(k) === 0) return base + m[k]; }
  return base;
}
function parseNum(v) {
  if (v == null) return 0;
  var m = String(v).replace(',', '.').match(/[\d.]+/);
  return m ? parseFloat(m[0]) : 0;
}
function pipeR(value) {
  if (value > 0) return Math.max(7, Math.min(22, 6 + Math.sqrt(value) * 1.6));
  return 9;
}
function comparePillars(a, b) {
  if (a === 'Unassigned') return b === 'Unassigned' ? 0 : 1;
  if (b === 'Unassigned') return -1;
  var ai = PILLARS.indexOf(a), bi = PILLARS.indexOf(b);
  if (ai >= 0 && bi >= 0) return ai - bi;
  if (ai >= 0) return -1;
  if (bi >= 0) return 1;
  return String(a).localeCompare(String(b));
}
function PipelineChart(p) {
  var ex = useState(false), expanded = ex[0];
  var SLOTS = pipeSlots(expanded);
  var rows = [];
  var seen = {};
  function addPillar(x){ var k = x || 'Unassigned'; if (!seen[k]) { seen[k] = true; rows.push(k); } }
  p.ideas.forEach(function(i){ addPillar(i.digital_pillar); });
  p.projects.forEach(function(pr){ addPillar(pr.digital_pillar); });
  rows.sort(comparePillars);
  if (!rows.length) return html`<p class="muted">No data yet — submit ideas or import projects.</p>`;
  var LW = 170, RH = 56, top = 54;
  var CW = expanded ? 72 : 96;
  var ideationCW = expanded ? CW : 130; // wider single ideation column
  function slotX(si) { return LW + (expanded ? CW * si : (si === 0 ? 0 : ideationCW + CW * (si - 1))); }
  function slotW(si) { return (!expanded && si === 0) ? ideationCW : CW; }
  var W = slotX(SLOTS.length - 1) + CW + 10, H = top + RH * rows.length + 10;
  var cell = {};
  var bubbles = [];
  function place(rowKey, slot, r, item) {
    if (slot === null) return;
    var ri = rows.indexOf(rowKey);
    var key = ri + '_' + slot;
    var n = cell[key] = (cell[key] || 0) + 1;
    var cx = slotX(slot) + slotW(slot) / 2 + (((n - 1) % 3) - 1) * 22;
    var cy = top + RH * ri + RH / 2 + (Math.floor((n - 1) / 3) % 2 ? 13 : -5 * ((n - 1) % 2));
    bubbles.push(Object.assign({ cx: cx, cy: cy, r: r }, item));
  }
  p.ideas.forEach(function(i) {
    place(i.digital_pillar || 'Unassigned', pipeSlotIdea(i, expanded), pipeR(parseNum(i.estimated_value)), {
      kind: 'idea', id: i.id, halo: i.priority || triageOverdue(i),
      label: i.idea_id + ' — ' + i.title + ' · ' + i.stage + (i.estimated_value ? ' · ' + i.estimated_value : '') });
  });
  p.projects.forEach(function(pr) {
    place(pr.digital_pillar || 'Unassigned', pipeSlotProject(pr, expanded), pipeR(parseNum(pr.capex_keur)), {
      kind: 'project', id: pr.id, halo: projectAlerts(pr, !!(p.chMap || {})[pr.project_id]).length > 0 || isPriorityProject(pr),
      label: pr.project_id + ' — ' + pr.project_name + (pr.capex_keur != null ? ' · CAPEX ' + pr.capex_keur + ' k€' : ' · no CAPEX data') });
  });
  return html`<div>
    <div style="display:flex;justify-content:flex-end;margin-bottom:4px" class="no-print">
      <button class="btn secondary small" onClick=${function(){ex[1](!expanded)}}>
        ${expanded ? '⇤ Collapse ideation (L0→L2)' : '⇥ Expand ideation stages'}
      </button>
    </div>
    <div style="overflow-x:auto">
    <svg width=${W} height=${H} viewBox="0 0 ${W} ${H}" style="min-width:${W}px">
      ${rows.map(function(pl, ri) {
        return html`<rect key=${'r'+ri} x="0" y=${top + RH * ri} width=${W} height=${RH} fill=${ri % 2 ? '#fafbfd' : '#ffffff'} />`; })}
      ${rows.map(function(pl, ri) {
        var label = pl.length > 24 ? pl.slice(0, 23) + '…' : pl;
        return html`<text key=${'t'+ri} x="8" y=${top + RH * ri + RH / 2 + 4} font-size="11.5" font-weight="600" fill="#333">${label}</text>`; })}
      ${!expanded && html`<rect x=${LW} y=${top} width=${ideationCW} height=${RH * rows.length} fill="#6d3fc0" opacity="0.04" />`}
      ${SLOTS.map(function(x, i) {
        var cx = slotX(i) + slotW(i) / 2;
        if (x.type === 'gate') {
          return html`<g key=${x.key}>
            <line x1=${cx} y1="44" x2=${cx} y2=${H - 8} stroke="#d5d9e0" stroke-dasharray="3 3" />
            <rect x=${cx - 13} y="16" width="26" height="26" transform="rotate(45 ${cx} 29)" fill="#101a33"><title>${x.sub}</title></rect>
            <text x=${cx} y="33" fill="#fff" font-size="10" font-weight="700" text-anchor="middle">${x.short}</text>
          </g>`;
        }
        return html`<text key=${x.key} x=${cx} y="32" font-size="11" font-weight="700" text-anchor="middle" fill="#66708a">${x.short}</text>`; })}
      ${bubbles.map(function(b, k) {
        return html`<g key=${k} style="cursor:pointer" onClick=${function(){ nav(b.kind === 'idea' ? '/ideas/' + b.id : '/projects/' + b.id); }}>
          ${b.halo && html`<circle cx=${b.cx} cy=${b.cy} r=${b.r + 4} fill="none" stroke="#fff" stroke-width="5" />`}
          ${b.halo && html`<circle cx=${b.cx} cy=${b.cy} r=${b.r + 4} fill="none" stroke="#c9342c" stroke-width="2.5" />`}
          <circle cx=${b.cx} cy=${b.cy} r=${b.r}
            fill=${b.kind === 'idea' ? '#eef0f4' : '#a9c2e8'}
            stroke=${b.kind === 'idea' ? '#8892ab' : '#6d88c4'}
            stroke-width="1.5" stroke-dasharray=${b.kind === 'idea' ? '4 3' : ''} opacity="0.9">
            <title>${b.label}</title>
          </circle>
        </g>`; })}
    </svg>
    </div>
    <div class="legend" style="display:flex;gap:16px;flex-wrap:wrap;font-size:11.5px;color:var(--muted);margin-top:6px;align-items:center">
      <span><span style="width:12px;height:12px;border-radius:50%;display:inline-block;background:#eef0f4;border:1.5px dashed #8892ab;margin-right:5px"></span>Idea (size = estimated value)</span>
      <span><span style="width:12px;height:12px;border-radius:50%;display:inline-block;background:#a9c2e8;border:1.5px solid #6d88c4;margin-right:5px"></span>Project (size = CAPEX)</span>
      <span><span style="width:12px;height:12px;border-radius:50%;display:inline-block;border:2.5px solid #c9342c;margin-right:5px"></span>Alert / priority</span>
      <span>◆ Gates G1→G5 · click a bubble to open its page</span>
    </div>
  </div>`;
}

/* ================= SteerCo PPT export ================= */
function exportSteercoPPT(I, P, D, chMap) {
  var pres = new PptxGenJS();
  pres.defineLayout({ name: 'WIDE', width: 13.33, height: 7.5 });
  pres.layout = 'WIDE';
  var RED = 'C4161C', INK = '111111', GREY = '666666', GREEN = '1A7F37', AMBER = 'B45309';
  function slide(title) {
    var s = pres.addSlide();
    s.addText(title, { x:0.5, y:0.3, w:12.3, h:0.6, fontSize:22, bold:true, color:INK });
    s.addShape('rect', { x:0.5, y:0.95, w:12.3, h:0.03, fill:{color:RED} });
    return s;
  }
  var today = new Date().toLocaleDateString('en-GB', { day:'2-digit', month:'long', year:'numeric' });
  // Slide 1 - title + funnel
  var s1 = pres.addSlide();
  s1.addText('Digitalization SteerCo Pack', { x:0.5, y:2.2, w:12.3, h:1, fontSize:34, bold:true, color:INK });
  s1.addText(today + '  ·  Generated by the Digitalization Program Cockpit', { x:0.5, y:3.2, w:12.3, h:0.5, fontSize:14, color:GREY });
  var funnel = [
    ['Submitted', I.filter(function(i){return i.stage==='L0 Submitted'}).length],
    ['In triage', I.filter(function(i){return i.stage==='L0 Triage'}).length],
    ['Qualified', I.filter(function(i){return ['L1 Qualified','L2 BC/Charter'].indexOf(i.stage)>=0}).length],
    ['At G1', I.filter(function(i){return i.stage==='G1 Approval'}).length],
    ['Converted', I.filter(function(i){return i.stage==='Converted'}).length],
    ['Active projects', P.filter(function(p){return (p.current_stage||'').indexOf('G5')!==0}).length]];
  funnel.forEach(function(kv, k) {
    s1.addText(String(kv[1]), { x:0.5+k*2.1, y:4.4, w:2, h:0.7, fontSize:30, bold:true, color:RED, align:'center' });
    s1.addText(kv[0], { x:0.5+k*2.1, y:5.1, w:2, h:0.4, fontSize:11, color:GREY, align:'center' });
  });
  // Slide 2 - decisions to take
  var open = D.filter(function(d){return ['To Decide','Blocked'].indexOf(d.status)>=0});
  var s2 = slide('Decisions to take');
  var rows = [[
    { text:'Committee', options:{bold:true, color:'FFFFFF', fill:{color:INK}} },
    { text:'Decision', options:{bold:true, color:'FFFFFF', fill:{color:INK}} },
    { text:'Related', options:{bold:true, color:'FFFFFF', fill:{color:INK}} },
    { text:'Due', options:{bold:true, color:'FFFFFF', fill:{color:INK}} },
    { text:'Reco', options:{bold:true, color:'FFFFFF', fill:{color:INK}} }]];
  open.slice(0, 12).forEach(function(d) {
    rows.push([ d.committee_target||'-', d.title||'-', (d.related_type||'')+' '+(d.related_id||''),
      d.due_date ? fmtDate(d.due_date) : '-', d.recommendation||'-' ]);
  });
  if (open.length) s2.addTable(rows, { x:0.5, y:1.2, w:12.3, fontSize:11, border:{pt:0.5, color:'DDDDDD'}, autoPage:true });
  else s2.addText('No open decisions.', { x:0.5, y:1.3, fontSize:14, color:GREY });
  // Slide 3 - alerts
  var s3 = slide('Alerts & exceptions');
  var alerts = [];
  P.forEach(function(p) { projectAlerts(p, !!(chMap || {})[p.project_id]).forEach(function(a) {
    alerts.push({ t:'['+a.type.toUpperCase()+'] '+p.project_id+' '+p.project_name+' - '+a.msg,
      c: a.type==='budget' ? RED : a.type==='planning' ? AMBER : GREY }); }); });
  I.filter(triageOverdue).forEach(function(i) {
    alerts.push({ t:'[TRIAGE] '+i.idea_id+' '+i.title+' - waiting more than '+TRIAGE_SLA_DAYS+' days', c:AMBER }); });
  if (alerts.length) alerts.slice(0, 18).forEach(function(a, k) {
    s3.addText('- ' + a.t, { x:0.6, y:1.2+k*0.33, w:12, h:0.32, fontSize:11.5, color:a.c });
  });
  else s3.addText('No alerts.', { x:0.5, y:1.3, fontSize:14, color:GREEN });
  // Slide 4 - escalations, priorities, quick wins
  var s4 = slide('Escalations · Priorities · Quick wins');
  var esc4 = D.filter(function(d){return d.status==='Escalated'});
  var prio = I.filter(function(i){return i.priority}).map(function(i){return i.idea_id+' '+i.title})
    .concat(P.filter(isPriorityProject).map(function(p){return p.project_id+' '+p.project_name}));
  var qw = I.filter(function(i){return i.quick_win}).map(function(i){return i.idea_id+' '+i.title})
    .concat(P.filter(isQuickWinProject).map(function(p){return p.project_id+' '+p.project_name}));
  function col(s, x, title, items, color) {
    s.addText(title, { x:x, y:1.2, w:4, h:0.4, fontSize:14, bold:true, color:color });
    (items.length ? items : ['None']).slice(0, 12).forEach(function(t, k) {
      s.addText('- ' + t, { x:x, y:1.7+k*0.32, w:4, h:0.3, fontSize:11, color:INK }); });
  }
  col(s4, 0.5, 'Escalations', esc4.map(function(d){return d.title}), RED);
  col(s4, 4.7, 'Priorities', prio, INK);
  col(s4, 8.9, 'Quick wins', qw, GREEN);
  // Slide 5 - highlights
  var s5 = slide('Positive highlights');
  var hl = D.filter(function(d){return d.status==='Decided'&&d.outcome==='Go'}).slice(0,5).map(function(d){return 'Go decision: '+d.title})
    .concat(I.filter(function(i){return i.stage==='Converted'}).slice(0,5).map(function(i){return i.idea_id+' converted to project '+i.linked_project_id}));
  if (hl.length) hl.slice(0, 12).forEach(function(t, k) {
    s5.addText('- ' + t, { x:0.6, y:1.2+k*0.38, w:12, h:0.35, fontSize:13, color:GREEN }); });
  else s5.addText('Highlights will appear as decisions are taken and initiatives convert.', { x:0.5, y:1.3, fontSize:13, color:GREY });
  pres.writeFile({ fileName: 'steerco_pack_' + new Date().toISOString().slice(0,10) + '.pptx' });
}

/* ================= Cockpit ================= */
var COCKPIT_STAGES = ['Ideation (L0→L2)','G1','S1','G2','S2','G3','S3','G4','S4','G5'];
function CockpitPage() {
  var expPillar = useState(null);
  var cfl = useState({ pillar:'', stage:'' });
  var ideas = useAsync(api.listIdeas, []);
  var chartersL = useAsync(api.listChartersLight, []);
  var projects = useAsync(api.listProjects, []);
  var decisions = useAsync(api.listDecisions, []);
  if (ideas.loading || projects.loading || decisions.loading) return html`<p>Loading…</p>`;
  var I = ideas.data||[], P = projects.data||[], D = decisions.data||[];
  var chMap = charterMap(chartersL.data);
  var cf = cfl[0];
  if (cf.pillar) {
    I = I.filter(function(i){ return (i.digital_pillar || 'Unassigned') === cf.pillar; });
    P = P.filter(function(p){ return (p.digital_pillar || 'Unassigned') === cf.pillar; });
  }
  if (cf.stage) {
    if (cf.stage === 'Ideation (L0→L2)') {
      I = I.filter(function(i){ return ['L0 Submitted','L0 Triage','L1 Qualified','L2 BC/Charter'].indexOf(i.stage) >= 0; });
      P = [];
    } else if (cf.stage === 'G1') {
      I = I.filter(function(i){ return i.stage === 'G1 Approval'; });
      P = [];
    } else {
      I = [];
      P = P.filter(function(p){ return (p.current_stage || '').indexOf(cf.stage) === 0; });
    }
  }
  var funnel = [
    ['Submitted', I.filter(function(i){return i.stage==='L0 Submitted'}).length],
    ['In triage', I.filter(function(i){return i.stage==='L0 Triage'}).length],
    ['Qualified (L1/L2)', I.filter(function(i){return ['L1 Qualified','L2 BC/Charter'].indexOf(i.stage)>=0}).length],
    ['At G1', I.filter(function(i){return i.stage==='G1 Approval'}).length],
    ['Converted', I.filter(function(i){return i.stage==='Converted'}).length]];
  var activeP = P.filter(function(p){return (p.current_stage||'').indexOf('G5') !== 0});
  var completed = P.filter(function(p){return (p.current_stage||'').indexOf('G5') === 0});
  var withAlerts = P.map(function(p){return {p:p, alerts:projectAlerts(p, !!chMap[p.project_id])}}).filter(function(x){return x.alerts.length});
  var budgetAlerts = withAlerts.filter(function(x){return x.alerts.some(function(a){return a.type==='budget'})});
  var planningAlerts = withAlerts.filter(function(x){return x.alerts.some(function(a){return a.type==='planning'})});
  var govAlerts = withAlerts.filter(function(x){return x.alerts.some(function(a){return a.type==='governance'})});
  var openDecisions = D.filter(function(d){return ['To Decide','Blocked'].indexOf(d.status)>=0});
  var nextSteerco = D.filter(function(d){return d.next_steerco && d.status!=='Decided'});
  var escalations = D.filter(function(d){return d.status==='Escalated'});
  var overdueTriage = I.filter(triageOverdue);
  var highlights = D.filter(function(d){return d.status==='Decided'&&d.outcome==='Go'}).slice(0,4).map(function(d){return '✅ Go decision: '+d.title})
    .concat(I.filter(function(i){return i.stage==='Converted'}).slice(0,3).map(function(i){return '🚀 '+i.idea_id+' converted to project '+i.linked_project_id}))
    .concat(completed.slice(0,3).map(function(p){return '🏁 '+p.project_name+' closed'}));
  var activeIdeas = I.filter(function(i){return ACTIVE_STAGES.indexOf(i.stage) >= 0});
  var overdueDecs = openDecisions.filter(function(d){return d.due_date && new Date(d.due_date) < new Date()});
  var capexTotal = P.reduce(function(s,p){return s + (p.capex_keur || 0)}, 0);
  var budgetTotal = P.reduce(function(s,p){return s + (p.current_year_budget || 0)}, 0);
  var noBudget = P.filter(function(p){return p.capex_keur == null && p.current_year_budget == null});
  var pillarCost = {};
  P.forEach(function(p){
    var k = p.digital_pillar || 'Unassigned';
    var e = pillarCost[k] = pillarCost[k] || { n:0, capex:0, budget:0, nodata:0 };
    e.n++; e.capex += (p.capex_keur || 0); e.budget += (p.current_year_budget || 0);
    if (p.capex_keur == null && p.current_year_budget == null) e.nodata++;
  });
  var pillarRows = Object.keys(pillarCost).sort(comparePillars);
  function alertLine(x, type, color, label) {
    return html`<div key=${x.p.id+type} class="alert-line"><${Badge} color=${color}>${label}<//>
      <span>${x.p.project_id} ${x.p.project_name}</span>
      <span class="muted small">${x.alerts.filter(function(a){return a.type===type}).map(function(a){return a.msg}).join('; ')}</span></div>`;
  }
  return html`<div>
    <div class="topbar">
      <div><h1>Cockpit</h1><p class="muted small mb0">Exception-based view — decisions, alerts, priorities. Target: SteerCo pack in under 30 min.</p></div>
      <div class="no-print" style="display:flex;gap:8px">
        <button class="btn" onClick=${function(){exportSteercoPPT(I, P, D, chMap)}}>📤 Export PPT pack</button>
        <button class="btn secondary" onClick=${function(){window.print()}}>🖨 Print</button>
      </div>
    </div>
    <div class="filters no-print">
      <select value=${cf.pillar} onChange=${function(e){cfl[1]({ pillar:e.target.value, stage:cf.stage })}}>
        <option value="">All pillars</option>
        ${(function(){
          var s = {}; var out = [];
          (ideas.data||[]).forEach(function(i){ var k=i.digital_pillar||'Unassigned'; if(!s[k]){s[k]=1;out.push(k);} });
          (projects.data||[]).forEach(function(p){ var k=p.digital_pillar||'Unassigned'; if(!s[k]){s[k]=1;out.push(k);} });
          return out.sort(comparePillars).map(function(pl){return html`<option key=${pl}>${pl}</option>`});
        })()}
      </select>
      <select value=${cf.stage} onChange=${function(e){cfl[1]({ pillar:cf.pillar, stage:e.target.value })}}>
        <option value="">All stages</option>
        ${COCKPIT_STAGES.map(function(s){return html`<option key=${s}>${s}</option>`})}
      </select>
      ${(cf.pillar || cf.stage) && html`<button class="btn secondary small" onClick=${function(){cfl[1]({pillar:'',stage:''})}}>Clear filters</button>`}
      ${(cf.pillar || cf.stage) && html`<span class="small muted">Filters apply to KPIs, cost and pipeline (decisions & escalations stay global).</span>`}
    </div>
    <div class="grid cols-4">
      <div class="card kpi"><div class="num">${activeIdeas.length}</div><div class="lbl">Active ideas (L0→G1)</div></div>
      <div class="card kpi"><div class="num" style=${overdueDecs.length ? 'color:var(--red)' : ''}>${openDecisions.length}</div>
        <div class="lbl">Open decisions${overdueDecs.length ? ' · ' + overdueDecs.length + ' overdue' : ''}</div></div>
      <div class="card kpi"><div class="num">${activeP.length}</div><div class="lbl">Active projects</div></div>
      <div class="card kpi"><div class="num" style="color:var(--green)">${completed.length}</div><div class="lbl">Closed projects</div></div>
    </div>
    <div class="grid cols-2">
      <div class="card">
        <h2>🚨 Escalations</h2>
        ${escalations.map(function(d){return html`<div key=${d.id} class="alert-line"><${Badge} color="red">Escalated<//><span>${d.title}</span></div>`})}
        ${!escalations.length && html`<p class="muted">None.</p>`}
      </div>
      <div class="card">
        <h2>🌟 Positive highlights</h2>
        ${highlights.length ? highlights.map(function(hl,i){return html`<div key=${i} class="alert-line"><span>${hl}</span></div>`})
          : html`<p class="muted">Nothing yet — they will appear as decisions are taken and initiatives convert.</p>`}
      </div>
    </div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:8px">
        <h2 class="mb0">💰 Cost control</h2>
        ${noBudget.length > 0 && html`<${Badge} color="red">${noBudget.length} project(s) without budget data<//>`}
      </div>
      <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(150px,1fr));margin-top:10px">
        <div class="kpi"><div class="num">${Math.round(capexTotal)}</div><div class="lbl">Total CAPEX (k€)</div></div>
        <div class="kpi"><div class="num">${Math.round(budgetTotal)}</div><div class="lbl">Current year budget (k€)</div></div>
        <div class="kpi"><div class="num" style=${noBudget.length ? 'color:var(--red)' : 'color:var(--green)'}>${noBudget.length}</div><div class="lbl">No budget data</div></div>
      </div>
      <table class="data" style="margin-top:6px">
        <thead><tr><th>Digital pillar</th><th>Projects</th><th>CAPEX k€</th><th>Y budget k€</th><th>No data</th></tr></thead>
        <tbody>${pillarRows.map(function(k){
          var e = pillarCost[k];
          var open = expPillar[0] === k;
          var rows = [html`<tr key=${k} onClick=${function(){expPillar[1](open ? null : k)}} style="cursor:pointer">
            <td>${open ? '▾' : '▸'} ${k}</td><td>${e.n}</td><td>${Math.round(e.capex)}</td><td>${Math.round(e.budget)}</td>
            <td>${e.nodata ? html`<${Badge} color="red">${e.nodata}<//>` : '—'}</td></tr>`];
          if (open) {
            P.filter(function(p){return (p.digital_pillar||'Unassigned') === k}).forEach(function(p){
              var noData = p.capex_keur == null && p.current_year_budget == null;
              rows.push(html`<tr key=${k + p.id} style="background:#fafbfd">
                <td style="padding-left:26px"><${A} href=${'/projects/'+p.id}>${p.project_id} ${p.project_name}<//></td>
                <td class="small">${p.current_stage || '—'}</td>
                <td>${p.capex_keur != null ? p.capex_keur : html`<${Badge} color="red">?<//>`}</td>
                <td>${p.current_year_budget != null ? p.current_year_budget : html`<${Badge} color="red">?<//>`}</td>
                <td>${noData ? html`<${Badge} color="red">no data<//>` : '—'}</td></tr>`);
            });
          }
          return rows; })}
        </tbody></table>
    </div>
    <div class="card">
      <h2>🗺 Portfolio pipeline — ideas & projects by pillar</h2>
      <${PipelineChart} ideas=${I} projects=${P} chMap=${chMap} />
    </div>
    <div class="grid cols-2">
      <div class="card">
        <h2>⚖️ Open decisions for next committees</h2>
        ${COMMITTEES.map(function(c){
          var rows = openDecisions.filter(function(d){return d.committee_target===c});
          return html`<div key=${c} style="margin-bottom:10px">
            <h3 class="muted small">${c} (${rows.length})</h3>
            ${rows.slice(0,6).map(function(d){
              return html`<div key=${d.id} class="alert-line">
                <${Badge} color=${d.status==='Blocked'?'red':'amber'}>${d.status}<//>
                <span>${d.title}</span>
                <span class="muted small">${d.due_date?'due '+fmtDate(d.due_date):''} ${d.recommendation?'· reco: '+d.recommendation:''}</span></div>`; })}
            ${!rows.length && html`<p class="muted small">None.</p>`}
          </div>`; })}
        ${nextSteerco.length > 0 && html`<p class="small"><${Badge} color="purple">Next SteerCo agenda<//> ${nextSteerco.length} item(s) flagged — <${A} href="/decisions">view<//></p>`}
      </div>
      <div>
        <div class="card">
          <h2>⚠️ Alerts</h2>
          ${budgetAlerts.map(function(x){return alertLine(x,'budget','red','Budget')})}
          ${planningAlerts.map(function(x){return alertLine(x,'planning','amber','Planning')})}
          ${overdueTriage.map(function(i){
            return html`<div key=${i.id} class="alert-line"><${Badge} color="amber">Triage<//>
              <span><${A} href=${'/ideas/'+i.id}>${i.idea_id} ${i.title}<//></span>
              <span class="muted small">waiting too long in triage</span></div>`; })}
          ${govAlerts.map(function(x){return alertLine(x,'governance','gray','Governance')})}
          ${!withAlerts.length && !overdueTriage.length && html`<p class="muted">No alerts. 🎉</p>`}
        </div>

      </div>
    </div>
  </div>`;
}


/* ================= Reviews (by pillar / lead) ================= */
function ReviewsPage() {
  var projects = useAsync(api.listProjects, []);
  var ideas = useAsync(api.listIdeas, []);
  var chartersL = useAsync(api.listChartersLight, []);
  if (projects.loading || ideas.loading) return html`<p>Loading…</p>`;
  var P = (projects.data||[]).filter(function(p){return (p.current_stage||'').indexOf('G5') !== 0});
  var atG1 = (ideas.data||[]).filter(function(i){return i.stage === 'G1 Approval'});
  var pillars = []; var seen = {};
  P.forEach(function(p){ var k = p.digital_pillar || 'Unassigned'; if (!seen[k]) { seen[k] = true; pillars.push(k); } });
  atG1.forEach(function(i){ var k = i.digital_pillar || 'Unassigned'; if (!seen[k]) { seen[k] = true; pillars.push(k); } });
  pillars.sort(comparePillars);
  return html`<div>
    <div class="topbar">
      <div><h1>Reviews</h1>
      <p class="muted small mb0">Pillar SteerCo preparation — projects grouped by pillar and lead, with initiatives awaiting G1.</p></div>
      <button class="btn secondary no-print" onClick=${function(){window.print()}}>🖨 Print</button>
    </div>
    ${!pillars.length && html`<div class="card"><p class="muted">No active projects or G1 initiatives yet.</p></div>`}
    ${pillars.map(function(pillar) {
      var inP = P.filter(function(p){return (p.digital_pillar||'Unassigned') === pillar});
      var g1 = atG1.filter(function(i){return (i.digital_pillar||'Unassigned') === pillar});
      var leads = []; var ls = {};
      inP.forEach(function(p){ var k = p.project_lead || 'No lead assigned'; if (!ls[k]) { ls[k] = true; leads.push(k); } });
      leads.sort();
      var chMap = charterMap(chartersL.data);
      var redCount = inP.filter(function(p){return projectAlerts(p, !!chMap[p.project_id]).length > 0}).length;
      return html`<div class="card" key=${pillar}>
        <h2>${pillar} <span class="muted small" style="font-weight:400">· ${inP.length} project(s)${redCount ? ' · ' : ''}${redCount ? html`<${Badge} color="red">${redCount} with alerts<//>` : ''}</span></h2>
        ${g1.length > 0 && html`<div style="margin-bottom:10px">
          <h3 class="muted small">Awaiting G1 decision</h3>
          ${g1.map(function(i){
            return html`<div key=${i.id} class="alert-line"><${Badge} color="purple">G1<//>
              <span><${A} href=${'/ideas/'+i.id}>${i.idea_id} ${i.title}<//></span>
              <span class="muted small">${i.committee_target || 'committee TBD'}</span></div>`; })}
        </div>`}
        ${leads.map(function(lead) {
          var its = inP.filter(function(p){return (p.project_lead||'No lead assigned') === lead});
          return html`<div key=${lead} style="margin-bottom:8px;border-top:1px solid var(--border);padding-top:8px">
            <h3 class="small" style="margin-bottom:4px">${lead} <span class="muted" style="font-weight:400">· ${its.length}</span></h3>
            ${its.map(function(p) {
              var alerts = projectAlerts(p, !!chMap[p.project_id]);
              return html`<div key=${p.id} class="alert-line">
                <span style="min-width:70px" class="muted small">${p.project_id}</span>
                <span><${A} href=${'/projects/'+p.id}>${p.project_name}<//></span>
                <${Badge} color="gray">${p.current_stage || '?'}<//>
                ${isPriorityProject(p) && html`<${Badge} color="red">P<//>`}
                ${isQuickWinProject(p) && html`<${Badge} color="green">QW<//>`}
                ${alerts.map(function(a, k){
                  return html`<${Badge} key=${k} color=${a.type === 'budget' ? 'red' : a.type === 'planning' ? 'amber' : 'gray'}>${a.msg}<//>`; })}
              </div>`; })}
          </div>`; })}
        ${!inP.length && html`<p class="muted small">No active projects in this pillar.</p>`}
      </div>`; })}
  </div>`;
}

/* ================= Notifications & Admin ================= */
function NotificationsPage(p) {
  var notifs = useAsync(api.listNotifications, []);
  function markAll(){ api.markAllRead().then(function(){ notifs.reload(); p.refreshUnread(); }); }
  function markOne(id){ api.markNotificationRead(id).then(function(){ notifs.reload(); p.refreshUnread(); }); }
  if (notifs.loading) return html`<p>Loading…</p>`;
  var list = notifs.data||[];
  return html`<div style="max-width:800px">
    <div class="topbar"><h1>Notifications</h1>
      ${list.some(function(n){return !n.read}) && html`<button class="btn secondary" onClick=${markAll}>Mark all read</button>`}</div>
    <div class="card">
      ${list.map(function(n){
        return html`<div key=${n.id} class="alert-line" style="opacity:${n.read?0.55:1}">
          <${Badge} color=${n.read?'gray':'blue'}>${n.type}<//>
          <span>${n.message}</span>
          <span class="muted small">${fmtDateTime(n.created_at)}</span>
          ${!n.read && html`<button class="btn secondary small" onClick=${function(){markOne(n.id)}}>✓</button>`}</div>`; })}
      ${!list.length && html`<p class="muted">No notifications.</p>`}
    </div>
  </div>`;
}
function AdminPage(p) {
  var profiles = useAsync(api.listProfiles, []);
  var refs = useAsync(api.listReference, []);
  var settings = useAsync(api.getSettings, []);
  var er = useState(null), bz = useState(false);
  var thr = useState(null), sla = useState(null);
  var newVal = useState({ pillar:'', function:'', value_type:'' });
  if (profiles.loading || refs.loading) return html`<p>Loading…</p>`;
  var R = refs.data || [];
  function sVal(key, fallback) {
    var row = (settings.data || []).find(function(s){ return s.key === key; });
    return row ? Number(row.value) : fallback;
  }
  var thrVal = thr[0] === null ? sVal('gate_ready_threshold', 80) : thr[0];
  var slaVal = sla[0] === null ? sVal('triage_sla_days', 7) : sla[0];

  function run(promise) {
    bz[1](true); er[1](null);
    return promise.then(function(){ refs.reload(); settings.reload(); if (p.onRefChange) p.onRefChange(); })
      .catch(function(e){ er[1](e.message); }).finally(function(){ bz[1](false); });
  }
  function setRole(id, role){ api.updateProfileRole(id, role).then(profiles.reload).catch(function(e){ er[1](e.message); }); }
  function addRef(cat) {
    var v = (newVal[0][cat] || '').trim();
    if (!v) return;
    var maxSort = R.filter(function(r){ return r.category === cat; })
      .reduce(function(m, r){ return Math.max(m, r.sort_order); }, 0);
    run(api.addReference(cat, v, maxSort + 1)).then(function(){
      newVal[1](Object.assign({}, newVal[0], (function(){ var o = {}; o[cat] = ''; return o; })()));
    });
  }
  function renameRef(r) {
    var nv = window.prompt('New name for "' + r.value + '":', r.value);
    if (!nv || nv.trim() === r.value) return;
    var prop = window.confirm('Also update existing ideas / projects / documents that use "' + r.value + '"?\nOK = propagate, Cancel = keep old name on existing records.');
    run(api.renameReference(r.category, r.value, nv.trim(), prop));
  }
  function saveSettings() {
    run(Promise.all([
      api.setSetting('gate_ready_threshold', Number(thrVal) || 80),
      api.setSetting('triage_sla_days', Number(slaVal) || 7) ]));
  }
  function refSection(cat, title, note) {
    var rows = R.filter(function(r){ return r.category === cat; });
    return html`<div class="card" key=${cat}>
      <h2>${title}</h2>
      ${note && html`<p class="small muted" style="margin-top:0">${note}</p>`}
      <table class="data"><tbody>
        ${rows.map(function(r){
          return html`<tr key=${r.id} style=${r.active ? '' : 'opacity:.5'}>
            <td>${r.value}</td>
            <td style="width:80px">${r.active ? html`<${Badge} color="green">active<//>` : html`<${Badge} color="gray">inactive<//>`}</td>
            <td style="width:170px;white-space:nowrap">
              <button class="btn secondary small" onClick=${function(){renameRef(r)}} disabled=${bz[0]}>Rename</button>${' '}
              <button class="btn secondary small" onClick=${function(){run(api.setReferenceActive(r.id, !r.active))}} disabled=${bz[0]}>
                ${r.active ? 'Deactivate' : 'Reactivate'}</button>
            </td></tr>`; })}
      </tbody></table>
      <div style="display:flex;gap:8px;margin-top:8px">
        <input type="text" placeholder="Add new…" value=${newVal[0][cat]}
          style="flex:1;padding:7px 10px;border:1px solid var(--border);border-radius:7px"
          onInput=${function(e){ newVal[1](Object.assign({}, newVal[0], (function(){ var o = {}; o[cat] = e.target.value; return o; })())); }}
          onKeyDown=${function(e){ if (e.key === 'Enter') addRef(cat); }} />
        <button class="btn small" onClick=${function(){addRef(cat)}} disabled=${bz[0]}>+ Add</button>
      </div>
    </div>`;
  }
  return html`<div style="max-width:860px">
    <div class="topbar"><h1>Administration</h1></div>
    ${er[0] && html`<p style="color:var(--red)">${er[0]}</p>`}
    <div class="card">
      <h2>Users & roles</h2>
      <p class="muted small" style="margin-top:0">Roles drive permissions (enforced server-side). The four roles are fixed by design — assignment is done here.</p>
      <table class="data">
        <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Active</th></tr></thead>
        <tbody>${(profiles.data||[]).map(function(pr){
          return html`<tr key=${pr.id}><td>${pr.name}</td><td class="small">${pr.email}</td>
            <td><select value=${pr.role} onChange=${function(e){setRole(pr.id, e.target.value)}}
              style="padding:5px 8px;border:1px solid var(--border);border-radius:6px">
              ${ROLES.map(function(r){return html`<option key=${r.value} value=${r.value}>${r.label}</option>`})}
            </select></td>
            <td>${pr.active ? html`<${Badge} color="green">active<//>` : html`<${Badge} color="gray">inactive<//>`}</td></tr>`; })}
        </tbody></table>
    </div>
    <div class="card">
      <h2>Governance settings</h2>
      <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(220px,1fr))">
        <${Field} label="Gate-ready threshold (%)" hint="required completeness of BC & Charter to pass G1">
          <input type="number" min="10" max="100" value=${thrVal} onInput=${function(e){thr[1](e.target.value)}} /><//>
        <${Field} label="Triage alert delay (days)" hint="ideas waiting longer are flagged in the Cockpit">
          <input type="number" min="1" max="90" value=${slaVal} onInput=${function(e){sla[1](e.target.value)}} /><//>
      </div>
      <button class="btn" onClick=${saveSettings} disabled=${bz[0]}>Save settings</button>
    </div>
    ${refSection('pillar', 'Digital pillars', 'Renaming can propagate to existing ideas and projects. Deactivated values disappear from forms but remain visible on historical records.')}
    ${refSection('function', 'Impacted functions', null)}
    ${refSection('value_type', 'Expected value types', null)}
  </div>`;
}

/* ================= App shell + router ================= */
function App() {
  var ss = useState(undefined), session = ss[0];
  var pf = useState(null), profile = pf[0];
  var un = useState(0), unread = un[0];
  var route = useRoute();
  useEffect(function(){
    api.getSession().then(function(s){ ss[1](s || null); });
    var sub = api.onAuthChange(function(s){ ss[1](s || null); });
    return function(){ sub.data.subscription.unsubscribe(); };
  }, []);
  var rt = useState(0);
  function loadReference() {
    Promise.all([api.listReference().catch(function(){return []}), api.getSettings().catch(function(){return []})])
      .then(function(res){ applyReference(res[0], res[1]); rt[1](function(x){return x+1}); });
  }
  useEffect(function(){
    if (session) {
      try {
        var target = sessionStorage.getItem('postLoginRoute');
        if (target) { sessionStorage.removeItem('postLoginRoute'); nav(target); }
      } catch(e){}
      api.getMyProfile().then(pf[1]).catch(function(){ pf[1](null); });
      api.listNotifications().then(function(ns){ un[1](ns.filter(function(n){return !n.read}).length); }).catch(function(){});
      loadReference();
    } else pf[1](null);
  }, [session]);
  function refreshUnread(){
    api.listNotifications().then(function(ns){ un[1](ns.filter(function(n){return !n.read}).length); }).catch(function(){});
  }
  if (SUPABASE_URL.indexOf('YOUR-PROJECT') >= 0) {
    return html`<div style="padding:40px;max-width:640px;margin:auto">
      <h1>Configuration needed</h1>
      <p>Open this HTML file in a text editor and set <code>SUPABASE_URL</code> and <code>SUPABASE_ANON_KEY</code> at the top of the first script block (values from your Supabase project: Settings → API).</p>
    </div>`;
  }
  if (session === undefined) return html`<div style="padding:40px">Loading…</div>`;
  if (!session) {
    if (route === '/' || route === '/welcome') return html`<${LandingPage} />`;
    if (route === '/signup') return html`<${Login} initialMode="signup" />`;
    if (route !== '/login') {
      // Deep link (e.g. from an email) — remember it and resume after sign-in.
      try { sessionStorage.setItem('postLoginRoute', route); } catch(e){}
    }
    return html`<${Login} />`;
  }
  if (!profile) return html`<div style="padding:40px">Loading profile…</div>`;
  var isPMTT = ['program_manager','transformation_team'].indexOf(profile.role) >= 0;
  var isPM = profile.role === 'program_manager';
  var auth = { session:session, profile:profile, isPMTT:isPMTT, isPM:isPM };

  var m;
  var page;
  if (route === '/' || route === '/welcome' || route === '/login' || route === '/signup') {
    nav(isPMTT ? '/cockpit' : profile.role === 'requester' ? '/my-ideas' : '/ideas'); page = html`<div />`;
  }
  else if (route === '/cockpit') page = html`<${CockpitPage} />`;
  else if (route === '/my-ideas') page = html`<${MyIdeasPage} auth=${auth} />`;
  else if (route === '/ideas') page = html`<${IdeationBoard} auth=${auth} />`;
  else if (route === '/ideas/new') page = html`<${IdeaForm} profile=${profile} />`;
  else if ((m = route.match(/^\/ideas\/([^/]+)\/business-case$/))) page = html`<${BCEditorPage} id=${m[1]} auth=${auth} />`;
  else if ((m = route.match(/^\/ideas\/([^/]+)\/charter$/))) page = html`<${CharterEditorPage} id=${m[1]} auth=${auth} />`;
  else if ((m = route.match(/^\/ideas\/([^/]+)$/))) page = html`<${IdeaDetail} id=${m[1]} auth=${auth} />`;
  else if (route === '/decisions') page = html`<${DecisionLog} auth=${auth} />`;
  else if (route === '/reviews') page = html`<${ReviewsPage} />`;
  else if ((m = route.match(/^\/projects\/([^/]+)$/))) page = html`<${ProjectDetailPage} id=${m[1]} auth=${auth} />`;
  else if (route === '/projects') page = html`<${ProjectsPage} />`;
  else if (route === '/import-export') page = html`<${ImportExportPage} />`;
  else if (route === '/notifications') page = html`<${NotificationsPage} refreshUnread=${refreshUnread} />`;
  else if (route === '/admin') page = html`<${AdminPage} onRefChange=${loadReference} />`;
  else page = html`<p>Not found. <${A} href="/">Home<//></p>`;

  function navLink(href, label) {
    var active = route === href || (href !== '/' && route.indexOf(href) === 0 && href !== '/ideas') || (href === '/ideas' && (route === '/ideas' || /^\/ideas\/(?!new)/.test(route)));
    return html`<a href=${'#'+href} class=${active ? 'active' : ''}>${label}</a>`;
  }
  return html`<div class="app">
    <aside class="sidebar">
      <div class="brand">Digitalization<br />Program Cockpit</div>
      <nav>
        ${isPMTT && navLink('/cockpit','📊 Cockpit')}
        ${profile.role === 'requester' ? navLink('/my-ideas','🏠 My Ideas') : navLink('/ideas','💡 Ideation Board')}
        ${navLink('/ideas/new','➕ Submit Idea')}
        ${isPMTT && navLink('/decisions','⚖️ Decision Log')}
        ${isPMTT && navLink('/reviews','🧭 Reviews')}
        ${(isPMTT || profile.role==='project_lead') && navLink('/projects','📁 Projects')}
        ${isPMTT && navLink('/import-export','🔄 SmartSheet I/O')}
        ${html`<a href="#/notifications" class=${route==='/notifications'?'active':''}>🔔 Notifications${unread > 0 && html`<span class="notif-dot">${unread}</span>`}</a>`}
        ${isPM && navLink('/admin','⚙️ Administration')}
      </nav>
      <div class="foot">
        ${profile.name}<br />
        <span style="text-transform:capitalize">${profile.role.replace(/_/g,' ')}</span><br />
        <a style="color:#8892ab" onClick=${function(){api.signOut()}}>Sign out</a>
      </div>
    </aside>
    <main class="main">${page}</main>
  </div>`;
}
render(h(App), document.getElementById('root'));
</script>
</body>
</html>
